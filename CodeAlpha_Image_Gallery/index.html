<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parth Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Parth Gallery</h1>
            <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
        </div>
    </header>
    
    <div class="search-section">
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search images...">
        </div>
    </div>

    <main>
        <section class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="city">City</button>
            <button class="filter-btn" data-filter="people">People</button>
            <button class="filter-btn" data-filter="animals">Animals</button>
        </section>

        <section class="gallery" id="gallery">
            <!-- Gallery items will be dynamically generated -->
        </section>

        <!-- Lightbox Modal -->
        <div class="lightbox" id="lightbox">
            <span class="close">&times;</span>
            <img class="lightbox-content" id="lightbox-img">
            <div class="lightbox-info">
                <h3 id="lightbox-title"></h3>
                <p id="lightbox-description"></p>
            </div>
            <div class="lightbox-nav">
                <button class="nav-btn prev-btn">‹</button>
                <button class="nav-btn next-btn">›</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
